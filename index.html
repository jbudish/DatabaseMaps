<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Map</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<style>
  :root {
    --ink: #1c2530;
    --ink-soft: #55606c;
    --line: #dde2e7;
    --panel: #fbfbfa;
    --accent: #bf5700;
    --accent-soft: #fbe9dc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: var(--ink); }

  #app { display: flex; height: 100%; }

  #sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  #sidebar-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  #sidebar h1 {
    font-size: 17px;
    font-weight: 650;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  #count {
    font-size: 13px;
    color: var(--ink-soft);
  }
  #count strong { color: var(--ink); font-weight: 650; }

  #sidebar-close {
    display: none;
    background: none;
    border: none;
    font-size: 20px;
    line-height: 1;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 4px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    font-weight: 650;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
  }
  .range-row { display: flex; gap: 8px; }
  .range-row input { width: 100%; }

  select, input[type="text"], input[type="number"] {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  #reset {
    align-self: flex-start;
    font-size: 12.5px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-weight: 600;
  }
  #reset:hover { text-decoration: underline; }

  #map { flex: 1; position: relative; }

  .maplibregl-popup-content {
    font-family: inherit;
    font-size: 13px;
    padding: 14px 16px;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(28,37,48,0.15);
    min-width: 210px;
  }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .popup-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
  .popup-row .k { color: var(--ink-soft); }
  .popup-row .v { font-weight: 600; text-align: right; }
  .popup-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 12.5px;
    font-weight: 650;
    color: var(--accent);
    text-decoration: none;
  }
  .popup-link:hover { text-decoration: underline; }

  #loading {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--ink-soft);
    z-index: 5;
  }

  #mobile-filter-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 15;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    cursor: pointer;
  }

  #sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 18;
  }

  @media (max-width: 768px) {
    #app { flex-direction: column; }

    #sidebar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      top: auto;
      width: 100%;
      max-height: 78vh;
      transform: translateY(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      border-right: none;
      border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
    }

    #sidebar.open { transform: translateY(0); }

    #sidebar-close { display: block; }

    #map { width: 100%; }

    #mobile-filter-toggle { display: block; }

    #sidebar-backdrop.open { display: block; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar-backdrop"></div>

  <div id="sidebar">
    <div id="sidebar-header">
      <div>
        <h1>Property Map</h1>
        <div id="count">Loading…</div>
      </div>
      <button id="sidebar-close" aria-label="Close filters">✕</button>
    </div>

    <div class="field">
      <label for="type-filter">Type</label>
      <select id="type-filter"><option value="">All types</option></select>
    </div>

    <div class="field">
      <label for="submarket-filter">Submarket</label>
      <select id="submarket-filter"><option value="">All submarkets</option></select>
    </div>

    <div class="field">
      <label for="city-filter">City</label>
      <select id="city-filter"><option value="">All cities</option></select>
    </div>

    <div class="field">
      <label for="stage-filter">Stage</label>
      <select id="stage-filter"><option value="">All stages</option></select>
    </div>

    <div class="field">
      <label for="broker-filter">Broker seller</label>
      <select id="broker-filter"><option value="">All brokers</option></select>
    </div>

    <div class="field">
      <label>Year built</label>
      <div class="range-row">
        <input type="number" id="year-min" placeholder="Min" />
        <input type="number" id="year-max" placeholder="Max" />
      </div>
    </div>

    <div class="field">
      <label>Units</label>
      <div class="range-row">
        <input type="number" id="units-min" placeholder="Min" />
        <input type="number" id="units-max" placeholder="Max" />
      </div>
    </div>

    <div class="field">
      <label for="owner-filter">Owner contains</label>
      <input type="text" id="owner-filter" placeholder="e.g. Murtaugh" />
    </div>

    <div class="field">
      <label for="close-filter">Recently Sold &amp; On Market</label>
      <select id="close-filter">
        <option value="">Any time</option>
        <option value="future">Future</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 6 months</option>
        <option value="365">Last year</option>
        <option value="730">Last 2 years</option>
      </select>
    </div>

    <button id="reset">Clear filters</button>
  </div>

  <button id="mobile-filter-toggle">Filters</button>

  <div id="map">
    <div id="loading">Loading properties…</div>
  </div>
</div>

<script>
const DATA_URL = "data/properties.json";

let allProperties = [];

const STAGE_ORDER = [
  "Closed",
  "Under Contract - Non-Contingent",
  "Under Contract - Contingent",
  "Active - Listed",
  "Active - Off Market",
  "Active - Awarded",
  "Pursuit - BOV",
  "Pursuit - Underwriting",
  "Tracking",
  "On Hold",
  "Didn't Sell",
  "Lost"
];

const STAGE_COLORS = {
  "Closed": { color: "#1f8a4c", bg: "#d3f2dd" },
  "Under Contract - Non-Contingent": { color: "#c0392b", bg: "#fbdcd8" },
  "Under Contract - Contingent": { color: "#c2185b", bg: "#fbdce9" },
  "Active - Listed": { color: "#a8710a", bg: "#fdf0cf" },
  "Active - Off Market": { color: "#a8710a", bg: "#fdf0cf" },
  "Active - Awarded": { color: "#a8710a", bg: "#fdf0cf" },
  "Pursuit - BOV": { color: "#c1670e", bg: "#fde3cc" },
  "Pursuit - Underwriting": { color: "#c1670e", bg: "#fde3cc" },
  "Tracking": { color: "#1c5fa8", bg: "#d9e8fb" },
  "On Hold": { color: "#5c6773", bg: "#e6e8eb" },
  "Didn't Sell": { color: "#5c6773", bg: "#e6e8eb" },
  "Lost": { color: "#5c6773", bg: "#e6e8eb" }
};

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [-93.2, 44.9],
  zoom: 8
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

map.on("load", async () => {
  const res = await fetch(DATA_URL);
  allProperties = await res.json();

  document.getElementById("loading").style.display = "none";

  map.addSource("properties", {
    type: "geojson",
    data: toGeoJSON(allProperties),
    cluster: true,
    clusterMaxZoom: 14,
    clusterRadius: 45
  });

  map.addLayer({
    id: "clusters",
    type: "circle",
    source: "properties",
    filter: ["has", "point_count"],
    paint: {
      "circle-color": [
        "step", ["get", "point_count"],
        "#f2b988", 25,
        "#e08e4f", 100,
        "#bf5700", 500,
        "#8a3d00"
      ],
      "circle-radius": [
        "step", ["get", "point_count"],
        14, 25,
        18, 100,
        24, 500,
        30
      ],
      "circle-stroke-width": 2,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addLayer({
    id: "cluster-count",
    type: "symbol",
    source: "properties",
    filter: ["has", "point_count"],
    layout: {
      "text-field": ["get", "point_count_abbreviated"],
      "text-font": ["Noto Sans Bold"],
      "text-size": 12
    },
    paint: { "text-color": "#ffffff" }
  });

  map.addLayer({
    id: "unclustered-point",
    type: "circle",
    source: "properties",
    filter: ["!", ["has", "point_count"]],
    paint: {
      "circle-color": "#bf5700",
      "circle-radius": 6,
      "circle-stroke-width": 2,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.on("click", "clusters", (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ["clusters"] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource("properties").getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom });
    });
  });

  map.on("click", "unclustered-point", (e) => {
    const f = e.features[0];
    const coords = f.geometry.coordinates.slice();
    const p = f.properties;

    const rows = [
      ["City", p.city],
      ["Owner", p.owner],
      ["Units", p.units || "—"],
      ["Year built", p.yearBuilt || "—"],
      ["Stage", p.stage || "—"],
      ["Guidance", formatCurrency(p.guidance)],
      ["Guidance/unit", formatCurrency(p.guidancePerUnit)]
    ].map(([k, v]) => `
      <div class="popup-row">
        <span class="k">${escapeHTML(k)}</span>
        <span class="v">${escapeHTML(String(v || "—"))}</span>
      </div>
    `).join("");

    const link = p.yardiLink
      ? `<a class="popup-link" href="${escapeAttr(normalizeUrl(p.yardiLink))}" target="_blank" rel="noopener">View in Yardi →</a>`
      : "";

    new maplibregl.Popup({ offset: 10 })
      .setLngLat(coords)
      .setHTML(`
        <div class="popup-name">${escapeHTML(p.name || "Unnamed property")}</div>
        ${rows}
        ${link}
      `)
      .addTo(map);
  });

  ["clusters", "unclustered-point"].forEach((layer) => {
    map.on("mouseenter", layer, () => (map.getCanvas().style.cursor = "pointer"));
    map.on("mouseleave", layer, () => (map.getCanvas().style.cursor = ""));
  });

  applyFilters();
});

function toGeoJSON(props) {
  return {
    type: "FeatureCollection",
    features: props.map((p) => ({
      type: "Feature",
      geometry: { type: "Point", coordinates: [p.lng, p.lat] },
      properties: {
        id: p.id,
        name: p.name,
        owner: p.owner,
        city: p.city,
        units: p.units,
        yearBuilt: p.yearBuilt,
        yardiLink: p.yardiLink,
        stage: p.stage,
        guidance: p.guidance,
        guidancePerUnit: p.guidancePerUnit
      }
    }))
  };
}

function uniqueSorted(values) {
  return [...new Set(values.filter(Boolean))].sort();
}

function rebuildSelect(id, values, placeholder) {
  const select = document.getElementById(id);
  const prevValue = select.value;
  select.innerHTML =
    `<option value="">${placeholder}</option>` +
    values.map((v) => `<option value="${escapeAttr(v)}">${escapeHTML(v)}</option>`).join("");
  select.value = values.includes(prevValue) ? prevValue : "";
}

function rebuildStageSelect(values) {
  const select = document.getElementById("stage-filter");
  const prevValue = select.value;
  const present = new Set(values);
  const ordered = STAGE_ORDER.filter((s) => present.has(s));
  select.innerHTML =
    `<option value="">All stages</option>` +
    ordered
      .map((s) => {
        const c = STAGE_COLORS[s] || { color: "#1c2530", bg: "#ffffff" };
        return `<option value="${escapeAttr(s)}" style="color:${c.color};background-color:${c.bg};">${escapeHTML(s)}</option>`;
      })
      .join("");
  select.value = ordered.includes(prevValue) ? prevValue : "";
}

function updateCount(shown, total) {
  document.getElementById("count").innerHTML =
    shown === total
      ? `<strong>${total.toLocaleString()}</strong> properties`
      : `<strong>${shown.toLocaleString()}</strong> of ${total.toLocaleString()} properties`;

  const toggle = document.getElementById("mobile-filter-toggle");
  toggle.textContent = shown === total ? "Filters" : `Filters (${shown.toLocaleString()})`;
}

function formatCurrency(value) {
  if (value === null || value === undefined || value === "") return null;
  const n = Number(value);
  if (isNaN(n)) return null;
  if (Math.abs(n) >= 1_000_000) return `$${(n / 1_000_000).toFixed(2)}M`;
  if (Math.abs(n) >= 1_000) return `$${(n / 1_000).toFixed(0)}K`;
  return `$${n.toFixed(0)}`;
}

function normalizeUrl(url) {
  if (!url) return "#";
  return /^https?:\/\//i.test(url) ? url : `https://${url}`;
}

function getFilterState() {
  return {
    type: document.getElementById("type-filter").value,
    submarket: document.getElementById("submarket-filter").value,
    city: document.getElementById("city-filter").value,
    stage: document.getElementById("stage-filter").value,
    broker: document.getElementById("broker-filter").value,
    yearMin: document.getElementById("year-min").value ? parseInt(document.getElementById("year-min").value, 10) : null,
    yearMax: document.getElementById("year-max").value ? parseInt(document.getElementById("year-max").value, 10) : null,
    unitsMin: document.getElementById("units-min").value ? parseInt(document.getElementById("units-min").value, 10) : null,
    unitsMax: document.getElementById("units-max").value ? parseInt(document.getElementById("units-max").value, 10) : null,
    ownerQuery: document.getElementById("owner-filter").value.trim().toLowerCase(),
    closeMode: document.getElementById("close-filter").value
  };
}

function matchesFilters(p, f, excludeKey) {
  if (f.type && excludeKey !== "type" && p.type !== f.type) return false;
  if (f.submarket && excludeKey !== "submarket" && p.submarket !== f.submarket) return false;
  if (f.city && excludeKey !== "city" && p.city !== f.city) return false;
  if (f.stage && excludeKey !== "stage" && p.stage !== f.stage) return false;
  if (f.broker && excludeKey !== "broker" && p.brokerSeller !== f.broker) return false;

  if (f.yearMin !== null && (!p.yearBuilt || p.yearBuilt < f.yearMin)) return false;
  if (f.yearMax !== null && (!p.yearBuilt || p.yearBuilt > f.yearMax)) return false;
  if (f.unitsMin !== null && (!p.units || p.units < f.unitsMin)) return false;
  if (f.unitsMax !== null && (!p.units || p.units > f.unitsMax)) return false;
  if (f.ownerQuery && !(p.owner || "").toLowerCase().includes(f.ownerQuery)) return false;

  if (f.closeMode) {
    if (!p.close) return false;
    const d = new Date(p.close);
    if (isNaN(d)) return false;
    const now = new Date();
    if (f.closeMode === "future") {
      if (d <= now) return false;
    } else {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - parseInt(f.closeMode, 10));
      if (d < cutoff || d > now) return false;
    }
  }

  return true;
}

function updateFacetOptions(state) {
  rebuildSelect(
    "type-filter",
    uniqueSorted(allProperties.filter((p) => matchesFilters(p, state, "type")).map((p) => p.type)),
    "All types"
  );
  rebuildSelect(
    "submarket-filter",
    uniqueSorted(allProperties.filter((p) => matchesFilters(p, state, "submarket")).map((p) => p.submarket)),
    "All submarkets"
  );
  rebuildSelect(
    "city-filter",
    uniqueSorted(allProperties.filter((p) => matchesFilters(p, state, "city")).map((p) => p.city)),
    "All cities"
  );
  rebuildStageSelect(
    uniqueSorted(allProperties.filter((p) => matchesFilters(p, state, "stage")).map((p) => p.stage))
  );
  rebuildSelect(
    "broker-filter",
    uniqueSorted(allProperties.filter((p) => matchesFilters(p, state, "broker")).map((p) => p.brokerSeller)),
    "All brokers"
  );
}

function applyFilters() {
  const state = getFilterState();
  const filtered = allProperties.filter((p) => matchesFilters(p, state, null));

  map.getSource("properties").setData(toGeoJSON(filtered));
  updateCount(filtered.length, allProperties.length);
  updateFacetOptions(state);
}

function escapeHTML(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return escapeHTML(str).replace(/"/g, "&quot;");
}

[
  "type-filter", "submarket-filter", "city-filter", "stage-filter", "broker-filter",
  "year-min", "year-max", "units-min", "units-max", "owner-filter", "close-filter"
].forEach((id) => {
  const el = document.getElementById(id);
  el.addEventListener(el.tagName === "SELECT" ? "change" : "input", applyFilters);
});

document.getElementById("reset").addEventListener("click", () => {
  ["type-filter", "submarket-filter", "city-filter", "stage-filter", "broker-filter"].forEach(
    (id) => (document.getElementById(id).value = "")
  );
  document.getElementById("year-min").value = "";
  document.getElementById("year-max").value = "";
  document.getElementById("units-min").value = "";
  document.getElementById("units-max").value = "";
  document.getElementById("owner-filter").value = "";
  document.getElementById("close-filter").value = "";
  applyFilters();
});

const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("sidebar-backdrop");

function openSidebar() {
  sidebar.classList.add("open");
  backdrop.classList.add("open");
}
function closeSidebar() {
  sidebar.classList.remove("open");
  backdrop.classList.remove("open");
}

document.getElementById("mobile-filter-toggle").addEventListener("click", openSidebar);
document.getElementById("sidebar-close").addEventListener("click", closeSidebar);
backdrop.addEventListener("click", closeSidebar);
</script>

</body>
</html>
