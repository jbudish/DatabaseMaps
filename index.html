<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Map</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<style>
  :root {
    --ink: #1c2530;
    --ink-soft: #55606c;
    --line: #dde2e7;
    --panel: #fbfbfa;
    --accent: #bf5700;
    --accent-soft: #fbe9dc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: var(--ink); }

  #app { display: flex; height: 100%; }

  #sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  #sidebar h1 {
    font-size: 17px;
    font-weight: 650;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  #count {
    font-size: 13px;
    color: var(--ink-soft);
  }
  #count strong { color: var(--ink); font-weight: 650; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 4px 0 -4px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }
  .section-label:first-of-type { border-top: none; padding-top: 0; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    font-weight: 650;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
  }
  .range-row { display: flex; gap: 8px; }
  .range-row input { width: 100%; }

  select, input[type="text"], input[type="number"] {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  #reset {
    align-self: flex-start;
    font-size: 12.5px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-weight: 600;
  }
  #reset:hover { text-decoration: underline; }

  #map { flex: 1; position: relative; }

  .maplibregl-popup-content {
    font-family: inherit;
    font-size: 13px;
    padding: 14px 16px;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(28,37,48,0.15);
    min-width: 200px;
  }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .popup-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
  .popup-row .k { color: var(--ink-soft); }
  .popup-row .v { font-weight: 600; text-align: right; }
  .popup-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 12.5px;
    font-weight: 650;
    color: var(--accent);
    text-decoration: none;
  }
  .popup-link:hover { text-decoration: underline; }

  #loading {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--ink-soft);
    z-index: 5;
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div>
      <h1>Property Map</h1>
      <div id="count">Loading…</div>
    </div>

    <div class="field">
      <label for="type-filter">Type</label>
      <select id="type-filter"><option value="">All types</option></select>
    </div>

    <div class="field">
      <label for="submarket-filter">Submarket</label>
      <select id="submarket-filter"><option value="">All submarkets</option></select>
    </div>

    <div class="field">
      <label for="city-filter">City</label>
      <select id="city-filter"><option value="">All cities</option></select>
    </div>

    <div class="field">
      <label>Year built</label>
      <div class="range-row">
        <input type="number" id="year-min" placeholder="Min" />
        <input type="number" id="year-max" placeholder="Max" />
      </div>
    </div>

    <div class="field">
      <label for="owner-filter">Owner contains</label>
      <input type="text" id="owner-filter" placeholder="e.g. Murtaugh" />
    </div>

    <div class="field">
      <label for="close-filter">Recently sold</label>
      <select id="close-filter">
        <option value="">Any time</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 6 months</option>
        <option value="365">Last year</option>
        <option value="730">Last 2 years</option>
      </select>
    </div>

    <button id="reset">Clear filters</button>
  </div>

  <div id="map">
    <div id="loading">Loading properties…</div>
  </div>
</div>

<script>
const DATA_URL = "data/properties.json";

let allProperties = [];

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [-93.2, 44.9],
  zoom: 8
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

map.on("load", async () => {
  const res = await fetch(DATA_URL);
  allProperties = await res.json();

  document.getElementById("loading").style.display = "none";

  map.addSource("properties", {
    type: "geojson",
    data: toGeoJSON(allProperties),
    cluster: true,
    clusterMaxZoom: 14,
    clusterRadius: 45
  });

  map.addLayer({
    id: "clusters",
    type: "circle",
    source: "properties",
    filter: ["has", "point_count"],
    paint: {
      "circle-color": [
        "step", ["get", "point_count"],
        "#f2b988", 25,
        "#e08e4f", 100,
        "#bf5700", 500,
        "#8a3d00"
      ],
      "circle-radius": [
        "step", ["get", "point_count"],
        14, 25,
        18, 100,
        24, 500,
        30
      ],
      "circle-stroke-width": 2,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.addLayer({
    id: "cluster-count",
    type: "symbol",
    source: "properties",
    filter: ["has", "point_count"],
    layout: {
      "text-field": ["get", "point_count_abbreviated"],
      "text-font": ["Noto Sans Bold"],
      "text-size": 12
    },
    paint: { "text-color": "#ffffff" }
  });

  map.addLayer({
    id: "unclustered-point",
    type: "circle",
    source: "properties",
    filter: ["!", ["has", "point_count"]],
    paint: {
      "circle-color": "#bf5700",
      "circle-radius": 6,
      "circle-stroke-width": 2,
      "circle-stroke-color": "#ffffff"
    }
  });

  map.on("click", "clusters", (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ["clusters"] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource("properties").getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom });
    });
  });

  map.on("click", "unclustered-point", (e) => {
    const f = e.features[0];
    const coords = f.geometry.coordinates.slice();
    const p = f.properties;

    const rows = [
      ["City", p.city],
      ["Owner", p.owner],
      ["Units", p.units || "—"],
      ["Year built", p.yearBuilt || "—"]
    ].map(([k, v]) => `
      <div class="popup-row">
        <span class="k">${escapeHTML(k)}</span>
        <span class="v">${escapeHTML(String(v || "—"))}</span>
      </div>
    `).join("");

    const link = p.yardiLink
      ? `<a class="popup-link" href="${escapeAttr(p.yardiLink)}" target="_blank" rel="noopener">View in Yardi →</a>`
      : "";

    new maplibregl.Popup({ offset: 10 })
      .setLngLat(coords)
      .setHTML(`
        <div class="popup-name">${escapeHTML(p.name || "Unnamed property")}</div>
        ${rows}
        ${link}
      `)
      .addTo(map);
  });

  ["clusters", "unclustered-point"].forEach((layer) => {
    map.on("mouseenter", layer, () => (map.getCanvas().style.cursor = "pointer"));
    map.on("mouseleave", layer, () => (map.getCanvas().style.cursor = ""));
  });

  populateSelect("city-filter", allProperties.map((p) => p.city));
  populateSelect("type-filter", allProperties.map((p) => p.type));
  populateSelect("submarket-filter", allProperties.map((p) => p.submarket));
  updateCount(allProperties.length, allProperties.length);
});

function toGeoJSON(props) {
  return {
    type: "FeatureCollection",
    features: props.map((p) => ({
      type: "Feature",
      geometry: { type: "Point", coordinates: [p.lng, p.lat] },
      properties: {
        id: p.id,
        name: p.name,
        owner: p.owner,
        city: p.city,
        units: p.units,
        yearBuilt: p.yearBuilt,
        yardiLink: p.yardiLink
      }
    }))
  };
}

function populateSelect(id, values) {
  const unique = [...new Set(values.filter(Boolean))].sort();
  const select = document.getElementById(id);
  for (const v of unique) {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  }
}

function updateCount(shown, total) {
  document.getElementById("count").innerHTML =
    shown === total
      ? `<strong>${total.toLocaleString()}</strong> properties`
      : `<strong>${shown.toLocaleString()}</strong> of ${total.toLocaleString()} properties`;
}

function applyFilters() {
  const city = document.getElementById("city-filter").value;
  const type = document.getElementById("type-filter").value;
  const submarket = document.getElementById("submarket-filter").value;
  const ownerQuery = document.getElementById("owner-filter").value.trim().toLowerCase();
  const yearMin = document.getElementById("year-min").value;
  const yearMax = document.getElementById("year-max").value;
  const closeDays = document.getElementById("close-filter").value;

  let closeCutoff = null;
  if (closeDays) {
    closeCutoff = new Date();
    closeCutoff.setDate(closeCutoff.getDate() - parseInt(closeDays, 10));
  }

  const filtered = allProperties.filter((p) => {
    if (city && p.city !== city) return false;
    if (type && p.type !== type) return false;
    if (submarket && p.submarket !== submarket) return false;
    if (ownerQuery && !(p.owner || "").toLowerCase().includes(ownerQuery)) return false;
    if (yearMin && (!p.yearBuilt || p.yearBuilt < parseInt(yearMin, 10))) return false;
    if (yearMax && (!p.yearBuilt || p.yearBuilt > parseInt(yearMax, 10))) return false;
    if (closeCutoff) {
      if (!p.close) return false;
      const closeDate = new Date(p.close);
      if (isNaN(closeDate) || closeDate < closeCutoff) return false;
    }
    return true;
  });

  map.getSource("properties").setData(toGeoJSON(filtered));
  updateCount(filtered.length, allProperties.length);
}

function escapeHTML(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return escapeHTML(str).replace(/"/g, "&quot;");
}

[
  "city-filter", "type-filter", "submarket-filter",
  "owner-filter", "year-min", "year-max", "close-filter"
].forEach((id) => {
  const el = document.getElementById(id);
  el.addEventListener(el.tagName === "SELECT" ? "change" : "input", applyFilters);
});

document.getElementById("reset").addEventListener("click", () => {
  ["city-filter", "type-filter", "submarket-filter"].forEach((id) => (document.getElementById(id).value = ""));
  document.getElementById("owner-filter").value = "";
  document.getElementById("year-min").value = "";
  document.getElementById("year-max").value = "";
  document.getElementById("close-filter").value = "";
  applyFilters();
});
</script>

</body>
</html>
